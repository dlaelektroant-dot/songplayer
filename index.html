<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Player</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        .player {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            margin: 0 0 20px 0;
            color: #333;
        }
        audio {
            width: 100%;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="player">
        <h1>🎵 Song Player</h1>
        <audio controls>
            <source src="https://ia601406.us.archive.org/29/items/wiosna26v1/wiosna26v1.wav" type="audio/wav">
            Twoja przeglądarka nie obsługuje odtwarzacza audio.
        </audio>
    </div>
</body>
</html>
